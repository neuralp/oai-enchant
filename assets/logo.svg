<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 170" width="300" height="170" shape-rendering="crispEdges">

  <!-- Background -->
  <rect width="300" height="170" fill="#080814"/>

  <!-- ═══════════════════ WAND ═══════════════════ -->

  <!-- Star (centre pixel gx=12, gy=4; each pixel 5×5) -->
  <rect x="60"  y="10" width="5" height="5" fill="#FFFFA0"/>
  <rect x="55"  y="15" width="5" height="5" fill="#FFD700"/>
  <rect x="60"  y="15" width="5" height="5" fill="#FFFFA0"/>
  <rect x="65"  y="15" width="5" height="5" fill="#FFD700"/>
  <rect x="50"  y="20" width="5" height="5" fill="#FFD700"/>
  <rect x="55"  y="20" width="5" height="5" fill="#FFD700"/>
  <rect x="60"  y="20" width="5" height="5" fill="#FFFFA0"/>
  <rect x="65"  y="20" width="5" height="5" fill="#FFD700"/>
  <rect x="70"  y="20" width="5" height="5" fill="#FFD700"/>
  <rect x="55"  y="25" width="5" height="5" fill="#FFD700"/>
  <rect x="60"  y="25" width="5" height="5" fill="#FFFFA0"/>
  <rect x="65"  y="25" width="5" height="5" fill="#FFD700"/>
  <rect x="60"  y="30" width="5" height="5" fill="#FFFFA0"/>

  <!-- Shaft (2-pixel-wide staircase; left=dark #A06428, right=light #D2924C) -->
  <rect x="55"  y="35"  width="5" height="5" fill="#A06428"/> <rect x="60"  y="35"  width="5" height="5" fill="#D2924C"/>
  <rect x="55"  y="40"  width="5" height="5" fill="#A06428"/> <rect x="60"  y="40"  width="5" height="5" fill="#D2924C"/>
  <rect x="50"  y="45"  width="5" height="5" fill="#A06428"/> <rect x="55"  y="45"  width="5" height="5" fill="#D2924C"/>
  <rect x="50"  y="50"  width="5" height="5" fill="#A06428"/> <rect x="55"  y="50"  width="5" height="5" fill="#D2924C"/>
  <rect x="45"  y="55"  width="5" height="5" fill="#A06428"/> <rect x="50"  y="55"  width="5" height="5" fill="#D2924C"/>
  <rect x="45"  y="60"  width="5" height="5" fill="#A06428"/> <rect x="50"  y="60"  width="5" height="5" fill="#D2924C"/>
  <rect x="40"  y="65"  width="5" height="5" fill="#A06428"/> <rect x="45"  y="65"  width="5" height="5" fill="#D2924C"/>
  <rect x="40"  y="70"  width="5" height="5" fill="#A06428"/> <rect x="45"  y="70"  width="5" height="5" fill="#D2924C"/>
  <rect x="35"  y="75"  width="5" height="5" fill="#A06428"/> <rect x="40"  y="75"  width="5" height="5" fill="#D2924C"/>
  <rect x="35"  y="80"  width="5" height="5" fill="#A06428"/> <rect x="40"  y="80"  width="5" height="5" fill="#D2924C"/>
  <rect x="30"  y="85"  width="5" height="5" fill="#A06428"/> <rect x="35"  y="85"  width="5" height="5" fill="#D2924C"/>
  <rect x="30"  y="90"  width="5" height="5" fill="#A06428"/> <rect x="35"  y="90"  width="5" height="5" fill="#D2924C"/>
  <rect x="25"  y="95"  width="5" height="5" fill="#A06428"/> <rect x="30"  y="95"  width="5" height="5" fill="#D2924C"/>
  <rect x="25"  y="100" width="5" height="5" fill="#A06428"/> <rect x="30"  y="100" width="5" height="5" fill="#D2924C"/>
  <rect x="20"  y="105" width="5" height="5" fill="#A06428"/> <rect x="25"  y="105" width="5" height="5" fill="#D2924C"/>
  <rect x="20"  y="110" width="5" height="5" fill="#A06428"/> <rect x="25"  y="110" width="5" height="5" fill="#D2924C"/>
  <rect x="15"  y="115" width="5" height="5" fill="#A06428"/> <rect x="20"  y="115" width="5" height="5" fill="#D2924C"/>
  <rect x="15"  y="120" width="5" height="5" fill="#A06428"/> <rect x="20"  y="120" width="5" height="5" fill="#D2924C"/>
  <rect x="15"  y="125" width="5" height="5" fill="#A06428"/> <rect x="20"  y="125" width="5" height="5" fill="#D2924C"/>

  <!-- Sparkles -->
  <rect x="10"  y="10"  width="5" height="5" fill="#FFE040"/>
  <rect x="75"  y="10"  width="5" height="5" fill="#FFE040"/>
  <rect x="85"  y="15"  width="5" height="5" fill="#FFE040"/>
  <rect x="5"   y="25"  width="5" height="5" fill="#FFE040"/>
  <rect x="90"  y="25"  width="5" height="5" fill="#FFE040"/>
  <rect x="80"  y="30"  width="5" height="5" fill="#FFE040"/>
  <rect x="85"  y="35"  width="5" height="5" fill="#FFE040"/>
  <rect x="0"   y="40"  width="5" height="5" fill="#FFE040"/>
  <rect x="70"  y="45"  width="5" height="5" fill="#FFE040"/>
  <rect x="80"  y="50"  width="5" height="5" fill="#FFE040"/>
  <rect x="10"  y="60"  width="5" height="5" fill="#FFE040"/>
  <rect x="90"  y="60"  width="5" height="5" fill="#FFE040"/>
  <rect x="5"   y="75"  width="5" height="5" fill="#FFE040"/>
  <rect x="95"  y="70"  width="5" height="5" fill="#FFE040"/>
  <rect x="15"  y="85"  width="5" height="5" fill="#FFE040"/>
  <rect x="90"  y="90"  width="5" height="5" fill="#FFE040"/>
  <rect x="10"  y="100" width="5" height="5" fill="#FFE040"/>
  <rect x="100" y="100" width="5" height="5" fill="#FFE040"/>
  <rect x="105" y="80"  width="5" height="5" fill="#FFE040"/>
  <rect x="5"   y="130" width="5" height="5" fill="#FFE040"/>
  <rect x="100" y="125" width="5" height="5" fill="#FFE040"/>
  <rect x="110" y="130" width="5" height="5" fill="#FFE040"/>
  <rect x="10"  y="150" width="5" height="5" fill="#FFE040"/>
  <rect x="100" y="145" width="5" height="5" fill="#FFE040"/>

  <!-- ═══════════════════ API DOCUMENT ═══════════════════ -->

  <!-- Page body: cols 24-55, rows 2-30 → x=120 y=10 w=160 h=150 -->
  <rect x="120" y="10" width="160" height="150" fill="#B8C4D8"/>

  <!-- Corner fold: 4-step staircase cut at top-right -->
  <rect x="260" y="10" width="20" height="5" fill="#080814"/>
  <rect x="265" y="15" width="15" height="5" fill="#080814"/>
  <rect x="270" y="20" width="10" height="5" fill="#080814"/>
  <rect x="275" y="25" width="5"  height="5" fill="#080814"/>

  <!-- Fold-face pixels (staircase edge, one pixel per step) -->
  <rect x="255" y="10" width="5" height="5" fill="#7888A0"/>
  <rect x="260" y="15" width="5" height="5" fill="#7888A0"/>
  <rect x="265" y="20" width="5" height="5" fill="#7888A0"/>
  <rect x="270" y="25" width="5" height="5" fill="#7888A0"/>

  <!-- Document header bar (rows 3-4, y=15, h=10) -->
  <rect x="130" y="15" width="115" height="10" fill="#8898B0"/>

  <!-- Separator rule (row 6, y=30, h=5) -->
  <rect x="125" y="30" width="145" height="5" fill="#9AAABB"/>

  <!-- GET row (rows 8-10, y=40, h=15) — badge 6px wide, path 20px wide -->
  <rect x="130" y="40" width="30"  height="15" fill="#3A8040"/>
  <rect x="165" y="40" width="100" height="15" fill="#606878"/>

  <!-- POST row (rows 12-14, y=60) -->
  <rect x="130" y="60" width="30"  height="15" fill="#2A50A8"/>
  <rect x="165" y="60" width="100" height="15" fill="#606878"/>

  <!-- DELETE row (rows 16-18, y=80) -->
  <rect x="130" y="80" width="30"  height="15" fill="#A83030"/>
  <rect x="165" y="80" width="100" height="15" fill="#606878"/>

  <!-- PATCH row (rows 20-22, y=100) -->
  <rect x="130" y="100" width="30"  height="15" fill="#A86020"/>
  <rect x="165" y="100" width="100" height="15" fill="#606878"/>

</svg>
