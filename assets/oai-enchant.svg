  <rect x="16" y="44" width="4" height="4" fill="#A06428"/> <rect x="20" y="44" width="4" height="4" fill="#D2924C"/>
  <rect x="16" y="48" width="4" height="4" fill="#A06428"/> <rect x="20" y="48" width="4" height="4" fill="#D2924C"/>
  <rect x="12" y="52" width="4" height="4" fill="#A06428"/> <rect x="16" y="52" width="4" height="4" fill="#D2924C"/>
