  <!-- Separator rule: row 6 (y=24 h=4) -->
  <rect x="60" y="24" width="56" height="4" fill="#9AAABB"/>

  <!-- GET row (y=32 h=8): badge green + path gray -->
  <rect x="60"  y="32" width="12" height="8" fill="#3A8040"/>
  <rect x="76"  y="32" width="36" height="8" fill="#606878"/>

  <!-- POST row (y=48 h=8): badge blue + path gray -->
  <rect x="60"  y="48" width="12" height="8" fill="#2A50A8"/>
  <rect x="76"  y="48" width="36" height="8" fill="#606878"/>

  <!-- DELETE row (y=64 h=8): badge red + path gray -->
  <rect x="60"  y="64" width="12" height="8" fill="#A83030"/>
  <rect x="76"  y="64" width="36" height="8" fill="#606878"/>

  <!-- PATCH row (y=80 h=8): badge orange + path gray -->
  <rect x="60"  y="80" width="12" height="8" fill="#A86020"/>
  <rect x="76"  y="80" width="36" height="8" fill="#606878"/>

</svg>
