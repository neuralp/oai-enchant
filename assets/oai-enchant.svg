  <rect x="40"  y="8"  width="4" height="4" fill="#FFE040"/>
  <rect x="48"  y="12" width="4" height="4" fill="#FFE040"/>
  <rect x="44"  y="20" width="4" height="4" fill="#FFE040"/>
  <rect x="52"  y="16" width="4" height="4" fill="#FFE040"/>
