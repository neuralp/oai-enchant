  <rect x="0"   y="36" width="4" height="4" fill="#FFE040"/>
  <rect x="4"   y="48" width="4" height="4" fill="#FFE040"/>
  <rect x="0"   y="60" width="4" height="4" fill="#FFE040"/>
  <rect x="4"   y="72" width="4" height="4" fill="#FFE040"/>
