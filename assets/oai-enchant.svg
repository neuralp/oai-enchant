  <!-- ═══ API DOCUMENT PAGE (cols 14-29, rows 2-28 → x=56 y=8 w=64 h=108) ═══ -->
  <rect x="56" y="8" width="64" height="108" fill="#B8C4D8"/>

  <!-- Corner fold: 3-step staircase cut at top-right -->
  <rect x="108" y="8"  width="12" height="4" fill="#080814"/>
  <rect x="112" y="12" width="8"  height="4" fill="#080814"/>
  <rect x="116" y="16" width="4"  height="4" fill="#080814"/>

  <!-- Fold-face pixels (one per step) -->
  <rect x="104" y="8"  width="4" height="4" fill="#7888A0"/>
  <rect x="108" y="12" width="4" height="4" fill="#7888A0"/>
  <rect x="112" y="16" width="4" height="4" fill="#7888A0"/>

  <!-- Header bar: rows 3-4, cols 15-25 (x=60 w=44 y=12 h=8) -->
